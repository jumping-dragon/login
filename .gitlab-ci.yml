stages:
  - build
  - test
  - deploy

build:
  stage: build
  image: docker:latest
  variables:
    IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    # Show version
    - sed -i "s|REPLACED_DURING_BUILD|$IMAGE|g" ./src/app/_components/version-logger.tsx
    # Login w/ Gitlab CI Creds
    - docker build --build-arg NEXT_PUBLIC_ENV=staging -t $IMAGE .
    - docker push $IMAGE
  only:
    refs:
      - branches
    changes:
      - src/**/*
      - Dockerfile
      - package.json
      - bun.lock
      - next.config.*
      - public/**/*
      - .gitlab-ci.yml

.open_next_build:
  stage: build
  image: oven/bun:latest
  variables:
    IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME
    SKIP_ENV_VALIDATION: "1"
  script:
    - sed -i "s|REPLACED_DURING_BUILD|$CI_COMMIT_REF_NAME|g" ./src/app/_components/version-logger.tsx
    - bun install --frozen-lockfile
    - bun run build:prod

Build Prod (OpenNext):
  extends: .open_next_build
  variables:
    NEXT_PUBLIC_ENV: production
  artifacts:
    paths:
      - .open-next/
    expire_in: never
  only:
    refs:
      - /^v\d+\.\d+\.\d+$/

Build Dev (OpenNext):
  extends: .open_next_build
  variables:
    NEXT_PUBLIC_ENV: staging
  artifacts:
    paths:
      - .open-next/
    expire_in: 1 week
  only:
    refs:
      - /^v\d+\.\d+\.\d+-dev\.\d+$/

Release (OpenNext):
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: "Build Prod (OpenNext)"
      artifacts: false
  script:
    - echo "Creating GitLab release for $CI_COMMIT_REF_NAME"
  release:
    tag_name: $CI_COMMIT_REF_NAME
    name: $CI_COMMIT_REF_NAME
    description: "Production release $CI_COMMIT_REF_NAME"
    assets:
      links:
        - name: OpenNext build (.open-next)
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_REF_NAME/download?job=Build%20Prod%20%28OpenNext%29"
          link_type: package
  only:
    refs:
      - /^v\d+\.\d+\.\d+$/

Deploy Infra (Login UI):
  stage: deploy
  needs:
    - job: "Build Prod (OpenNext)"
      artifacts: false
  trigger:
    project: networkdiscovery/t5nuscanner/infra
    branch: main
    strategy: depend
  variables:
    LOGIN_VERSION: $CI_COMMIT_REF_NAME # resolves to the tag name (e.g. v1.3.0)
  environment:
    name: production
    url: https://login.threatreveal.org
  when: manual
  only:
    refs:
      - /^v\d+\.\d+\.\d+$/

Trivy_container_scanning:
  stage: test
  image: alpine:3.11
  variables:
    GIT_STRATEGY: none
    IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  allow_failure: true
  before_script:
    - export TRIVY_VERSION=${TRIVY_VERSION:-v0.69.2}
    - apk add --no-cache curl docker-cli
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin ${TRIVY_VERSION}
    - curl -sSL -o /tmp/trivy-gitlab.tpl https://github.com/aquasecurity/trivy/raw/${TRIVY_VERSION}/contrib/gitlab.tpl
    - trivy registry login --username "$CI_REGISTRY_USER" --password "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - trivy image --cache-dir .trivycache/ -q --disable-telemetry --format template --template "@/tmp/trivy-gitlab.tpl" -o gl-container-scanning-report.json $IMAGE
    # - trivy image --cache-dir .trivycache/ -q --disable-telemetry --table-mode detailed $IMAGE
    - trivy image --cache-dir .trivycache/ -q --disable-telemetry --severity CRITICAL,HIGH --table-mode detailed --exit-code 1 $IMAGE
  cache:
    paths:
      - .trivycache/
  artifacts:
    reports:
      container_scanning: gl-container-scanning-report.json
  dependencies: []
  only:
    refs:
      - branches
    changes:
      - src/**/*
      - Dockerfile
      - package.json
      - bun.lock
      - next.config.*
      - public/**/*
      - .gitlab-ci.yml